{% extends "base.html" %}

{% block header_title %}Subscription Confirmed{% endblock %}

{% block content %}
<div class="flex min-h-[60vh] flex-col items-center justify-center text-center">
    <div class="flex size-16 items-center justify-center rounded-full bg-green-100">
        <svg xmlns="http://www.w3.org/2000/svg" class="size-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
    </div>
    <h2 class="mt-6 text-2xl font-bold text-zinc-900">You're subscribed!</h2>
    <p class="mt-3 max-w-sm text-sm text-zinc-500">Your subscription is active. Credits will appear in your account shortly — it may take a moment for the payment to process.</p>
    <div class="mt-8 flex items-center gap-3">
        <a href="/settings" up-follow class="btn btn-outline rounded-lg text-sm">View Account</a>
        <a href="/" up-follow class="btn btn-primary rounded-lg text-sm">Go to Dashboard</a>
    </div>
</div>
{% endblock %}
