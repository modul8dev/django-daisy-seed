<main>
<div class="p-6 max-w-lg mx-auto">
    <h2 class="text-xl font-bold mb-2">Import Products</h2>
    <p class="text-sm text-zinc-500 mb-6">Enter your store URL. Shopify and WooCommerce stores are detected automatically.</p>

    {% if error %}
    <div class="flex items-center gap-3 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800 mb-4">
        {{ error }}
    </div>
    {% endif %}

    <form method="post"
          up-submit
          up-layer="current"
          x-data="{ importing: false }"
          @submit="importing = true">
        {% csrf_token %}

        <div class="form-control w-full mb-6" x-show="!importing">
            <label class="label" for="shop_url">
                <span class="label-text font-medium">Store URL</span>
            </label>
            <input type="text"
                   name="shop_url"
                   id="shop_url"
                   class="input input-bordered w-full"
                   placeholder="mystore.com"
                   value="{{ shop_url|default:'' }}"
                   required>
            <label class="label">
                <span class="label-text-alt text-zinc-400">e.g. mystore.myshopify.com or mystore.com</span>
            </label>
        </div>

        <div class="flex flex-col items-center justify-center py-8" x-show="importing" style="display:none">
            <span class="loading loading-spinner loading-lg text-indigo-600"></span>
            <p class="mt-4 text-sm text-zinc-500">Detecting store and importing products…</p>
            <p class="mt-1 text-xs text-zinc-400">This may take a moment.</p>
        </div>

        <div class="flex justify-end gap-2" x-show="!importing">
            <button type="button" class="btn btn-ghost" up-dismiss>Cancel</button>
            <button type="submit" class="btn btn-primary">Import</button>
        </div>
    </form>
</div>
</main>
