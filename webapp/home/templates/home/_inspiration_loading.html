<div id="inspiration-deferred"
     data-inspiration-key="{{ cache_key }}"
     data-inspiration-result-url="{% url 'inspiration_cards_result' %}?key={{ cache_key }}">
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
        {% for _ in "123" %}
        <div class="flex flex-col overflow-hidden rounded-2xl border border-zinc-200 bg-white shadow-sm animate-pulse">
            <div class="h-40 bg-zinc-100"></div>
            <div class="p-4 space-y-3">
                <div class="h-4 bg-zinc-100 rounded w-3/4"></div>
                <div class="h-3 bg-zinc-100 rounded w-1/2"></div>
                <div class="h-8 bg-zinc-100 rounded w-28 mt-2"></div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
